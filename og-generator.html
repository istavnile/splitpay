<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      background: #030712;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #030712;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 72px 96px;
      overflow: hidden;
    }

    /* Background grid pattern */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Glow blob top-right */
    .glow-tr {
      position: absolute;
      top: -120px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(16,185,129,0.18) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* Glow blob bottom-left */
    .glow-bl {
      position: absolute;
      bottom: -140px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* Left content */
    .left {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: 620px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 100px;
      padding: 8px 20px;
      width: fit-content;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .badge-text {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #10b981;
    }

    .title {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      color: #ffffff;
    }

    .title span {
      color: #10b981;
    }

    .subtitle {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      max-width: 520px;
    }

    .url {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(16,185,129,0.6);
      text-transform: uppercase;
    }

    /* Right — mock UI cards */
    .right {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
    }

    .mock-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      width: 340px;
    }

    .mock-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .mock-icon.green  { background: rgba(16,185,129,0.2); }
    .mock-icon.indigo { background: rgba(99,102,241,0.2); }
    .mock-icon.rose   { background: rgba(244,63,94,0.2); }

    .mock-text { flex: 1; }
    .mock-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
    }
    .mock-value {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .mock-value.green  { color: #10b981; }
    .mock-value.indigo { color: #818cf8; }
    .mock-value.rose   { color: #fb7185; }

    /* Avatars row */
    .mock-avatars {
      display: flex;
      margin-left: -6px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #030712;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      margin-left: -8px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 4px 0;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="card">
    <div class="glow-tr"></div>
    <div class="glow-bl"></div>

    <!-- Left: brand + copy -->
    <div class="left">
      <div class="badge">
        <div class="badge-dot"></div>
        <span class="badge-text">Gratis · Sin comisiones</span>
      </div>

      <div class="title">SPLIT<span>PAY</span></div>

      <div class="subtitle">
        Divide gastos con amigos, familia o compañeros.<br />
        Calcula quién debe qué, al instante.
      </div>

      <div class="url">splitpay.istavnile.cloud</div>
    </div>

    <!-- Right: mock UI -->
    <div class="right">
      <div class="mock-card">
        <div class="mock-icon green">💸</div>
        <div class="mock-text">
          <div class="mock-label">Gasto Total</div>
          <div class="mock-value green">S/.340.50</div>
        </div>
      </div>

      <div class="mock-card">
        <div class="mock-icon indigo">⚖️</div>
        <div class="mock-text">
          <div class="mock-label">Tu balance</div>
          <div class="mock-value indigo">+S/.170.25</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="mock-card">
        <div class="mock-icon rose">👥</div>
        <div class="mock-text">
          <div class="mock-label">Colaboradores</div>
          <div class="mock-avatars">
            <div class="avatar" style="background:#10b981; margin-left:0">C</div>
            <div class="avatar" style="background:#6366f1">A</div>
            <div class="avatar" style="background:#f43f5e">H</div>
            <div class="avatar" style="background:#d97706">+2</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
