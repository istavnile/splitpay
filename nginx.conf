server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression for Faster Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Any route that doesn't have a file extension (e.g. /about)
    # is routed to index.html for Single Page Applications (Expo web)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API PROXY FOR SUPABASE (Solves CORS and Protocol issues)
    location /auth/v1/ {
        resolver 8.8.8.8;
        proxy_pass ${EXPO_PUBLIC_SUPABASE_URL}/auth/v1/;
        proxy_set_header Host ${SUPABASE_HOSTNAME};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    location /rest/v1/ {
        resolver 8.8.8.8;
        proxy_pass ${EXPO_PUBLIC_SUPABASE_URL}/rest/v1/;
        proxy_set_header Host ${SUPABASE_HOSTNAME};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Browser caching for static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
