<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitPay - Gastos Compartidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans p-4 md:p-8 min-h-screen">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex justify-end mb-2 relative z-20">
            <div class="bg-gray-800 p-1.5 rounded-lg border border-gray-700 flex items-center shadow-sm">
                <span class="text-xs text-gray-400 mr-2 ml-2 font-medium uppercase tracking-wider">Moneda:</span>
                <select id="monedaSelect" onchange="cambiarMoneda()" class="bg-gray-700 text-emerald-400 font-bold border-none rounded text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 cursor-pointer p-1">
                    <option value="S/">Soles (S/)</option>
                    <option value="$">USD ($)</option>
                </select>
            </div>
        </div>

        <header class="text-center mb-8 -mt-6">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                SplitPay
            </h1>
            <p class="text-gray-400 text-sm">Calculadora dinámica de gastos compartidos</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 shadow-lg">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-700 pb-2">1. Participantes y Eventos</h2>
                    
                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-1">Agregar Participante</label>
                        <div class="flex gap-2">
                            <input type="text" id="nuevaPersona" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 placeholder-gray-500" placeholder="Ej: Carlos">
                            <button onclick="agregarPersona()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded text-sm font-bold transition shadow-md">+</button>
                        </div>
                        <div id="listaPersonasTags" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Agregar Evento/Categoría</label>
                        <div class="flex gap-2">
                            <input type="text" id="nuevoEvento" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 placeholder-gray-500" placeholder="Ej: Viaje a la playa">
                            <button onclick="agregarEvento()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-2 rounded text-sm font-bold transition shadow-md">+</button>
                        </div>
                        <div id="listaEventosTags" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 shadow-lg">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-700 pb-2">2. Registrar Gasto</h2>
                    <form id="expenseForm" class="space-y-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Evento</label>
                            <select id="eventoSelect" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                                <option value="" disabled selected>Agrega un evento primero...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">¿Quién pagó?</label>
                            <select id="personaSelect" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                                <option value="" disabled selected>Agrega participantes primero...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Detalle</label>
                            <input type="text" id="item" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-blue-500 placeholder-gray-500" placeholder="Ej: Comida, Transporte...">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Monto</label>
                            <div class="relative">
                                <span id="monedaSymbolInput" class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 text-sm font-bold">S/</span>
                                <input type="number" id="monto" min="0" step="0.01" class="w-full bg-gray-700 text-white border border-gray-600 rounded py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-blue-500 placeholder-gray-500" placeholder="0.00">
                            </div>
                        </div>
                        <div class="pt-2">
                            <button type="button" onclick="agregarGasto()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-2 px-4 rounded shadow-lg transition duration-200">
                                Agregar a la lista
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 shadow-lg flex flex-col h-full max-h-[400px]">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-700 pb-2">3. Historial de Gastos</h2>
                    <div class="overflow-y-auto flex-1 pr-2">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="sticky top-0 bg-gray-800 z-10">
                                <tr class="text-gray-400 border-b border-gray-700">
                                    <th class="pb-2 font-medium">Evento</th>
                                    <th class="pb-2 font-medium">Detalle</th>
                                    <th class="pb-2 font-medium">Pagó</th>
                                    <th class="pb-2 font-medium">Monto</th>
                                    <th class="pb-2 text-center font-medium">Borrar</th>
                                </tr>
                            </thead>
                            <tbody id="listaGastosTabla" class="divide-y divide-gray-700">
                                <tr><td colspan="5" class="py-4 text-center text-gray-500 italic">No hay gastos registrados.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-xl p-5 border-l-4 border-emerald-500 shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
                        <svg class="w-24 h-24 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"></path></svg>
                    </div>
                    
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 border-b border-gray-700 pb-2 relative z-10">4. Balance Final</h2>
                    
                    <div id="resumenTotales" class="mb-4 flex flex-wrap gap-2 text-sm relative z-10"></div>
                    
                    <div id="instruccionesPago" class="p-4 bg-gray-900 rounded-lg border border-gray-700 text-gray-300 shadow-inner mb-6 relative z-10">
                        Configura participantes y agrega gastos para calcular el balance.
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 relative z-10">
                        <button onclick="enviarPorWhatsApp()" class="flex-1 bg-[#25D366] hover:bg-[#1da851] text-white font-bold py-2 px-4 rounded shadow-lg transition flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.418-.097.824z"></path></svg>
                            WhatsApp
                        </button>
                        <button onclick="copiarTexto()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded shadow-lg transition flex items-center justify-center gap-2 border border-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            Copiar
                        </button>
                        <button onclick="enviarPorCorreo()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded shadow-lg transition flex items-center justify-center gap-2 border border-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            Correo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let personas = [];
        let eventos = [];
        let gastos = [];
        let textoParaExportar = "";
        let moneda = "S/"; // Moneda por defecto

        actualizarSelectsYTags();

        // --- GESTIÓN DE MONEDA ---
        function cambiarMoneda() {
            moneda = document.getElementById('monedaSelect').value;
            document.getElementById('monedaSymbolInput').innerText = moneda;
            actualizarTablaGastos(); // Actualiza los símbolos en la tabla y en el balance
        }

        // --- GESTIÓN DE CONFIGURACIÓN ---
        function agregarPersona() {
            const input = document.getElementById('nuevaPersona');
            const nombre = input.value.trim();
            if (nombre && !personas.includes(nombre)) {
                personas.push(nombre);
                input.value = '';
                actualizarSelectsYTags();
                calcularBalance();
            }
        }

        function eliminarPersona(nombre) {
            if (gastos.some(g => g.persona === nombre)) {
                alert(`No puedes eliminar a ${nombre} porque ya tiene gastos registrados.`);
                return;
            }
            personas = personas.filter(p => p !== nombre);
            actualizarSelectsYTags();
            calcularBalance();
        }

        function agregarEvento() {
            const input = document.getElementById('nuevoEvento');
            const nombre = input.value.trim();
            if (nombre && !eventos.includes(nombre)) {
                eventos.push(nombre);
                input.value = '';
                actualizarSelectsYTags();
            }
        }

        function eliminarEvento(nombre) {
            if (gastos.some(g => g.evento === nombre)) {
                alert(`No puedes eliminar el evento "${nombre}" porque tiene gastos registrados.`);
                return;
            }
            eventos = eventos.filter(e => e !== nombre);
            actualizarSelectsYTags();
        }

        function actualizarSelectsYTags() {
            const tagsPersonas = document.getElementById('listaPersonasTags');
            if(personas.length === 0) {
                tagsPersonas.innerHTML = '<span class="text-xs text-gray-500 italic">No hay participantes aún.</span>';
            } else {
                tagsPersonas.innerHTML = personas.map(p => 
                    `<span class="bg-blue-900/50 text-blue-300 border border-blue-800 text-xs px-2 py-1 rounded flex items-center font-medium shadow-sm">
                        ${p} <button onclick="eliminarPersona('${p}')" class="ml-2 text-blue-400 hover:text-red-400 font-bold transition">✕</button>
                    </span>`
                ).join('');
            }

            const tagsEventos = document.getElementById('listaEventosTags');
            if(eventos.length === 0) {
                tagsEventos.innerHTML = '<span class="text-xs text-gray-500 italic">No hay eventos aún.</span>';
            } else {
                tagsEventos.innerHTML = eventos.map(e => 
                    `<span class="bg-emerald-900/50 text-emerald-300 border border-emerald-800 text-xs px-2 py-1 rounded flex items-center font-medium shadow-sm">
                        ${e} <button onclick="eliminarEvento('${e}')" class="ml-2 text-emerald-400 hover:text-red-400 font-bold transition">✕</button>
                    </span>`
                ).join('');
            }

            const selPersona = document.getElementById('personaSelect');
            if(personas.length === 0) {
                selPersona.innerHTML = '<option value="" disabled selected>Agrega participantes primero...</option>';
            } else {
                selPersona.innerHTML = personas.map(p => `<option value="${p}">${p}</option>`).join('');
            }

            const selEvento = document.getElementById('eventoSelect');
            if(eventos.length === 0) {
                selEvento.innerHTML = '<option value="" disabled selected>Agrega un evento primero...</option>';
            } else {
                selEvento.innerHTML = eventos.map(e => `<option value="${e}">${e}</option>`).join('');
            }
        }

        // --- GESTIÓN DE GASTOS ---
        function agregarGasto() {
            const evento = document.getElementById('eventoSelect').value;
            const persona = document.getElementById('personaSelect').value;
            const item = document.getElementById('item').value.trim();
            const monto = parseFloat(document.getElementById('monto').value);

            if (!evento || !persona) {
                return alert("Asegúrate de haber creado al menos un evento y un participante.");
            }
            if (!item || isNaN(monto) || monto <= 0) {
                return alert("Ingresa un detalle y un monto mayor a 0.");
            }

            gastos.push({ id: Date.now(), evento, persona, item, monto });
            
            document.getElementById('item').value = '';
            document.getElementById('monto').value = '';
            
            actualizarTablaGastos();
        }

        function eliminarGasto(id) {
            gastos = gastos.filter(g => g.id !== id);
            actualizarTablaGastos();
        }

        function actualizarTablaGastos() {
            const tbody = document.getElementById('listaGastosTabla');
            if(gastos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-4 text-center text-gray-500 italic">No hay gastos registrados.</td></tr>';
            } else {
                tbody.innerHTML = gastos.map(g => `
                    <tr class="hover:bg-gray-700/50 transition">
                        <td class="py-3 pr-2 text-gray-300">${g.evento}</td>
                        <td class="py-3 pr-2 text-gray-300">${g.item}</td>
                        <td class="py-3 pr-2 font-semibold text-blue-400">${g.persona}</td>
                        <td class="py-3 pr-2 text-gray-300 font-mono">${moneda} ${g.monto.toFixed(2)}</td>
                        <td class="py-3 text-center">
                            <button onclick="eliminarGasto(${g.id})" class="text-gray-500 hover:text-red-400 bg-gray-800 hover:bg-gray-700 rounded p-1 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
            calcularBalance();
        }

        // --- MOTOR DE BALANCE ---
        function calcularBalance() {
            if (personas.length === 0) {
                document.getElementById('instruccionesPago').innerHTML = "Agrega participantes para calcular.";
                document.getElementById('resumenTotales').innerHTML = "";
                textoParaExportar = "";
                return;
            }

            let totales = {};
            personas.forEach(p => totales[p] = 0);
            let totalGeneral = 0;

            gastos.forEach(g => {
                if(totales[g.persona] !== undefined) { 
                    totales[g.persona] += g.monto; 
                    totalGeneral += g.monto; 
                }
            });

            const cuotaPorPersona = totalGeneral / personas.length;

            document.getElementById('resumenTotales').innerHTML = personas.map(p => `
                <div class="bg-gray-900/50 p-2 rounded border border-gray-700 flex-1 min-w-[100px] text-center">
                    <span class="block font-bold text-gray-300">${p}</span>
                    <span class="block text-xs text-emerald-400 font-mono">Pagó: ${moneda} ${totales[p].toFixed(2)}</span>
                </div>
            `).join('');

            if (totalGeneral === 0) {
                document.getElementById('instruccionesPago').innerHTML = "Aún no hay gastos registrados para cuadrar.";
                textoParaExportar = "No hay gastos registrados aún.";
                return;
            }

            let saldos = personas.map(p => ({ nombre: p, saldo: totales[p] - cuotaPorPersona }));
            let deudores = saldos.filter(s => s.saldo < -0.01).sort((a, b) => a.saldo - b.saldo); 
            let acreedores = saldos.filter(s => s.saldo > 0.01).sort((a, b) => b.saldo - a.saldo); 

            let instruccionesHTML = "";
            let textoPlano = `📊 SPLITPAY - BALANCE DE GASTOS\n\n💵 Costo Total: ${moneda} ${totalGeneral.toFixed(2)}\n👤 Cuota p/persona: ${moneda} ${cuotaPorPersona.toFixed(2)}\n\n👇 RESUMEN DE PAGOS:\n`;

            personas.forEach(p => {
                textoPlano += `- ${p} pagó: ${moneda} ${totales[p].toFixed(2)}\n`;
            });

            textoPlano += `\n🚨 TRANSFERENCIAS A REALIZAR:\n`;

            let i = 0, j = 0;
            let hubieronDeudas = false;

            while (i < deudores.length && j < acreedores.length) {
                let deudor = deudores[i];
                let acreedor = acreedores[j];
                let montoATransferir = Math.min(Math.abs(deudor.saldo), acreedor.saldo);
                hubieronDeudas = true;

                instruccionesHTML += `
                <div class="mb-2 p-3 bg-gray-800 rounded flex flex-col sm:flex-row sm:items-center justify-between border border-gray-700">
                    <div class="text-sm text-gray-300">
                        <span class="text-red-400 font-bold">${deudor.nombre}</span> le transfiere a 
                        <span class="text-emerald-400 font-bold">${acreedor.nombre}</span>
                    </div>
                    <div class="font-mono font-bold text-lg text-white mt-1 sm:mt-0">
                        ${moneda} ${montoATransferir.toFixed(2)}
                    </div>
                </div>`;
                
                textoPlano += `🔴 ${deudor.nombre} transfiere a 🟢 ${acreedor.nombre} -> ${moneda} ${montoATransferir.toFixed(2)}\n`;

                deudor.saldo += montoATransferir; acreedor.saldo -= montoATransferir;
                if (Math.abs(deudor.saldo) < 0.01) i++;
                if (acreedor.saldo < 0.01) j++;
            }

            if (!hubieronDeudas) {
                instruccionesHTML = "<div class='text-center font-medium text-emerald-400 py-3'>¡Las cuentas están exactas! Nadie debe a nadie. 🎉</div>";
                textoPlano += "¡Las cuentas están exactas! Nadie debe a nadie. 🎉\n";
            }

            document.getElementById('instruccionesPago').innerHTML = `
                <div class="mb-4 flex justify-between items-center bg-gray-800 p-3 rounded border border-gray-700">
                    <span class="font-bold text-gray-200">Gasto Total: ${moneda} ${totalGeneral.toFixed(2)}</span>
                    <span class="text-sm text-gray-400">Cuota: ${moneda} ${cuotaPorPersona.toFixed(2)} c/u</span>
                </div>
                ${instruccionesHTML}
            `;
            textoParaExportar = textoPlano;
        }

        // --- FUNCIONES DE EXPORTACIÓN ---
        function verificarDatos() {
            if (!textoParaExportar || gastos.length === 0) {
                alert("Registra algunos gastos primero.");
                return false;
            }
            return true;
        }

        function enviarPorCorreo() {
            if (!verificarDatos()) return;
            const asunto = encodeURIComponent("Balance de Gastos Compartidos");
            const cuerpo = encodeURIComponent(textoParaExportar);
            window.location.href = `mailto:?subject=${asunto}&body=${cuerpo}`;
        }

        function enviarPorWhatsApp() {
            if (!verificarDatos()) return;
            const texto = encodeURIComponent(textoParaExportar);
            window.open(`https://wa.me/?text=${texto}`, '_blank');
        }

        function copiarTexto() {
            if (!verificarDatos()) return;
            navigator.clipboard.writeText(textoParaExportar).then(() => {
                alert("¡Texto copiado al portapapeles!");
            }).catch(err => {
                alert("Error al copiar: " + err);
            });
        }
    </script>
</body>
</html>
